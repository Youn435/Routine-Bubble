<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Ready Go — 외출 준비</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ready Go">
<meta name="theme-color" content="#f2f4ff">
<!-- tabler 웹폰트 제거 — SVG 인라인으로 대체 -->
<link rel="manifest" href="manifest.json">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:       #f2f4ff;
  --surface:  rgba(255,255,255,0.82);
  --border:   rgba(170,178,230,0.28);
  --border2:  rgba(150,160,220,0.45);
  --accent:   #7b8cde;
  --accent2:  #a78bfa;
  --text:     #2a2d4a;
  --sub:      #8f93b8;
  --hint:     #b8bcce;
  --green:    #59b88a;
  --font:     -apple-system, 'Pretendard', sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  overflow: hidden;
  width: 100vw; height: 100vh;
  /* iOS 키보드 올라올 때 뷰포트 밀림 방지 */
  position: fixed;
}

.app {
  width: 100vw; height: 100vh;
  height: -webkit-fill-available;
  background: var(--bg);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
  padding-top: env(safe-area-inset-top, 0px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

.status-bar { display: none; }
.view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* ══ NAV ══ */
.nav-bar {
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px;
  background: rgba(255,255,255,0.9);
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0; z-index: 10; order: -1;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; opacity: 0.35; transition: all 0.2s;
  padding: 8px 20px; min-height: 48px; justify-content: center;
  border-radius: 14px; user-select: none;
}
.nav-item.active { opacity: 1; background: rgba(123,140,222,0.1); }
.nav-item svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; display: block; }
.nav-label { font-size: 11px; color: var(--text); font-weight: 500; }

/* ══ HOME ══ */
#view-home { background: var(--bg); position: relative; overflow: hidden; }
#view-home .bubble-stage { overflow: visible; }
/* 메뉴가 bubble-stage 위로 삐져나와도 보이도록 */
#view-home > .bubble-stage { clip-path: none; }

.glow-orb { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(55px); }
.glow-orb-1 { width: 65vw; height: 65vw; top: -15%; left: -20%; background: radial-gradient(circle, rgba(180,160,255,0.35) 0%, transparent 70%); }
.glow-orb-2 { width: 55vw; height: 55vw; top: 5%; right: -15%; background: radial-gradient(circle, rgba(140,175,255,0.3) 0%, transparent 70%); }
.glow-orb-3 { width: 50vw; height: 50vw; bottom: 15%; left: 10%; background: radial-gradient(circle, rgba(160,210,255,0.2) 0%, transparent 70%); }

.home-top {
  padding: 20px 24px 0;
  display: flex; justify-content: space-between; align-items: flex-start;
  flex-shrink: 0; position: relative; z-index: 1;
}

.time-display {
  font-size: clamp(48px, 15vw, 72px);
  font-weight: 100; color: var(--text);
  letter-spacing: -3px; line-height: 1;
}
.time-sub { font-size: 13px; color: var(--hint); margin-top: 6px; }

.bubble-stage { flex: 1; position: relative; overflow: visible; z-index: 1; }

.home-countdown-box {
  text-align: right; cursor: pointer;
  background: rgba(123,140,222,0.08);
  border: 1px solid rgba(123,140,222,0.2);
  border-radius: 16px; padding: 10px 14px;
  min-width: 88px;
}
.home-countdown-label {
  font-size: 10px; color: var(--hint);
  letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 3px;
}
.home-countdown-num {
  font-size: clamp(20px, 6vw, 26px);
  font-weight: 200; color: var(--accent);
  letter-spacing: -0.5px; line-height: 1.1;
}

.empty-state {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px; padding: 40px;
}
.empty-icon {
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(123,140,222,0.1);
  border: 1.5px solid rgba(123,140,222,0.25);
  display: flex; align-items: center; justify-content: center;
}
.empty-icon i { font-size: 24px; color: var(--accent); }
.empty-text { font-size: 15px; color: var(--hint); text-align: center; line-height: 1.9; }
.empty-text strong { color: var(--sub); font-weight: 500; }

/* BUBBLES */
.bubble {
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; user-select: none;
  position: absolute; will-change: transform;
  background: #fff;
  box-shadow: 0 6px 24px rgba(100,110,190,0.18), 0 2px 8px rgba(100,110,190,0.10);
  opacity: 0;
  animation: bubbleFadeIn 0.5s ease forwards;
  -webkit-tap-highlight-color: transparent;
  /* iOS 길게 누르기 기본 동작 차단 */
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  touch-action: none;
}
.bubble:active { opacity: 1 !important; }

@keyframes bubbleLongPress {
  0%   { box-shadow: 0 6px 24px rgba(100,110,190,0.18), 0 0 0 0 rgba(123,140,222,0.5); }
  100% { box-shadow: 0 6px 24px rgba(100,110,190,0.18), 0 0 0 24px rgba(123,140,222,0); }
}
@keyframes bubblePulseScale {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.04); }
}
.bubble.pressing {
  animation: bubbleLongPress 0.6s ease forwards,
             bubblePulseScale 0.6s ease infinite;
  border: 2px solid rgba(123,140,222,0.7) !important;
}

@keyframes bubbleFadeIn {
  0%   { opacity: 0; transform: scale(0.75); }
  60%  { opacity: 1; transform: scale(1.04); }
  100% { opacity: 1; transform: scale(1); }
}

.task-label {
  font-size: 15px; font-weight: 700; color: var(--text);
  text-align: center; padding: 0 14px; line-height: 1.35;
  transition: opacity 0.2s;
}
.task-meta { font-size: 11px; color: var(--sub); margin-top: 4px; transition: opacity 0.2s; }

.done-ring {
  position: absolute; inset: -4px; border-radius: 50%;
  border: 2.5px solid var(--green); opacity: 0; transition: opacity 0.3s;
}
.done-check {
  position: absolute; font-size: 20px; color: var(--green);
  opacity: 0; transition: opacity 0.3s 0.1s; font-weight: 700;
}
.bubble.completing .done-ring { opacity: 1; }
.bubble.completing .task-label { opacity: 0; }
.bubble.completing .task-meta { opacity: 0; }
.bubble.completing .done-check { opacity: 1; }

@keyframes bubblePop {
  0%   { transform: scale(1); opacity: 1; }
  25%  { transform: scale(1.1); }
  100% { transform: scale(0); opacity: 0; }
}
.bubble.vanish {
  animation: bubblePop 0.4s cubic-bezier(0.4,0,0.6,1) forwards !important;
  pointer-events: none;
}

/* ── 버블 액션 메뉴 (꾹 누르기 후 나타나는 카메라/체크 아이콘) ── */
.bubble-action-menu {
  position: absolute;
  pointer-events: none;
  z-index: 50;
  display: flex;
  gap: 18px;
  transform: translate(-50%, -50%);
}
.bubble-action-btn {
  width: 58px; height: 58px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: #fff;
  box-shadow: 0 6px 24px rgba(80,90,180,0.22), 0 2px 8px rgba(80,90,180,0.12);
  border: 2px solid rgba(123,140,222,0.18);
  cursor: pointer;
  pointer-events: all;
  padding: 0;
  box-sizing: border-box;
  /* 팝인 애니메이션 — opacity·scale을 CSS 변수로 분리해서 hover transform과 충돌 방지 */
  animation: actionBtnPop 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
  transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
}
.bubble-action-btn:nth-child(1) { animation-delay: 0s; }
.bubble-action-btn:nth-child(2) { animation-delay: 0.07s; }

.bubble-action-btn svg {
  width: 24px; height: 24px;
  stroke: #7b8cde; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  flex-shrink: 0;
  display: block;
}
.bubble-action-btn.action-check svg { stroke: #59b88a; }

@keyframes actionBtnPop {
  0%   { opacity: 0; transform: scale(0.5); }
  100% { opacity: 1; transform: scale(1); }
}

.bubble-action-btn.hovered {
  transform: scale(1.22) !important;
  box-shadow: 0 8px 32px rgba(80,90,180,0.32);
}
.bubble-action-btn.hovered.action-camera {
  background: #7b8cde; border-color: #7b8cde;
}
.bubble-action-btn.hovered.action-camera svg { stroke: #fff; }
.bubble-action-btn.hovered.action-check {
  background: #59b88a; border-color: #59b88a;
}
.bubble-action-btn.hovered.action-check svg { stroke: #fff; }

/* DEPART BAR */
.depart-bar {
  flex-shrink: 0; padding: 14px 20px 16px;
  background: rgba(255,255,255,0.9);
  border-top: 1px solid var(--border2); z-index: 5;
}
.depart-meta {
  display: flex; justify-content: space-between; align-items: flex-end; gap: 16px;
  margin-bottom: 14px;
}
.depart-left { display: flex; flex-direction: column; justify-content: center; }
.depart-label-text { font-size: 11px; color: var(--hint); letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 4px; }
.depart-countdown-num {
  font-size: clamp(24px, 7vw, 32px);
  font-weight: 200; color: var(--text);
  letter-spacing: -1px; line-height: 1;
}
.depart-countdown-num span {
  font-size: 13px; font-weight: 400; color: var(--sub);
  letter-spacing: 0; margin-left: 2px;
}

.progress-wrap { position: relative; }
.progress-track {
  width: 100%; height: 20px;
  background: rgba(123,140,222,0.1);
  border-radius: 99px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px; width: 0%;
  transition: width 1s linear;
}
.progress-label-row {
  display: flex; justify-content: space-between;
  margin-top: 6px;
}
.progress-label-row span {
  font-size: 11px; color: var(--hint); font-weight: 500;
}

@keyframes countdownUrgent {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.04); }
}
.depart-countdown-num.urgent { animation: countdownUrgent 1.5s ease-in-out infinite; }
#departTimeBtn {
  flex-shrink: 0;
  background: rgba(123,140,222,0.08);
  border: 1px solid rgba(123,140,222,0.25);
  border-radius: 999px; cursor: pointer;
  padding: 10px 16px; font-size: 13px; min-height: 44px;
  color: var(--accent); font-family: inherit; font-weight: 600;
  white-space: nowrap; display: flex; align-items: center; gap: 6px;
}
#departTimeBtn i { font-size: 14px; }

/* COMPLETE OVERLAY */
.complete-overlay {
  position: absolute; inset: 0;
  background: rgba(242,244,255,0.97);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 20; gap: 14px; padding: 40px;
}
.complete-overlay.show { display: flex; }

/* CAMERA OVERLAY */
.camera-overlay {
  position: fixed; inset: 0;
  background: #000;
  z-index: 200;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
}
.camera-overlay.show { display: flex; }

.camera-video {
  width: 100%; height: 100%;
  object-fit: cover;
  position: absolute; inset: 0;
}

.camera-ui {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: max(48px, env(safe-area-inset-bottom, 48px));
  gap: 24px;
}

.camera-label {
  font-size: 15px; font-weight: 600; color: #fff;
  background: rgba(0,0,0,0.4);
  padding: 8px 20px; border-radius: 999px;
  backdrop-filter: blur(8px);
}

.camera-btn-row {
  display: flex; align-items: center; justify-content: center;
  gap: 48px; width: 100%;
}

.camera-cancel-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.camera-cancel-btn svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }

.camera-shutter {
  width: 76px; height: 76px; border-radius: 50%;
  background: #fff;
  border: 4px solid rgba(255,255,255,0.5);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.camera-shutter:active { transform: scale(0.92); opacity: 0.85; }

.camera-flip-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.camera-flip-btn svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.complete-orb {
  width: 110px; height: 110px; border-radius: 50%;
  background: radial-gradient(circle at 38% 35%, rgba(200,190,255,0.95) 0%, rgba(160,150,240,0.7) 55%, rgba(139,156,244,0.3) 100%);
  box-shadow: 0 12px 48px rgba(123,140,222,0.25);
  margin-bottom: 8px;
  animation: popIn 0.5s cubic-bezier(0.17,0.67,0.45,1.3);
}
@keyframes popIn { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }

.complete-title { font-size: 24px; font-weight: 300; color: var(--text); text-align: center; line-height: 1.5; }
.complete-desc { font-size: 14px; color: var(--sub); text-align: center; line-height: 1.7; }
.complete-btn {
  margin-top: 16px; padding: 15px 44px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 999px; color: #fff;
  font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 20px rgba(123,140,222,0.3);
}

/* ══ CHECKLIST ══ */
#view-checklist { background: var(--bg); overflow: hidden; }

.screen-header {
  padding: 16px 22px 14px;
  border-bottom: 1px solid var(--border2);
  background: rgba(255,255,255,0.9);
  flex-shrink: 0;
}
.screen-title { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
.screen-sub { font-size: 13px; color: var(--hint); margin-top: 3px; }

.template-tabs {
  display: flex; gap: 8px; padding: 14px 20px;
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0; background: var(--bg);
}
.template-tabs::-webkit-scrollbar { display: none; }

.tab-pill {
  flex-shrink: 0; font-size: 14px; padding: 8px 18px; min-height: 36px;
  border-radius: 999px; border: 1px solid var(--border2);
  background: #fff; cursor: pointer;
  color: var(--sub); font-family: inherit; transition: all 0.15s; font-weight: 500;
}
.tab-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.checklist-body {
  flex: 1; overflow-y: auto; padding: 8px 16px 12px;
  -webkit-overflow-scrolling: touch; min-height: 0;
  background: #e8eaf8;
  display: flex; flex-direction: column; gap: 6px;
}

.check-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 12px; border-bottom: none;
  cursor: pointer; user-select: none; min-height: 56px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 1px 4px rgba(100,110,190,0.08);
}
.check-circle {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; font-size: 12px; color: transparent;
  margin: 8px 4px;
}
.check-item.checked .check-circle {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent; color: #fff;
}
.check-text {
  flex: 1; font-size: 15px; color: var(--text); transition: all 0.2s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.check-item.checked .check-text { color: var(--hint); text-decoration: line-through; }
.check-badge { font-size: 12px; padding: 3px 10px; border-radius: 999px; background: rgba(123,140,222,0.1); color: var(--accent); font-weight: 500; }

.drag-handle {
  font-size: 16px; color: var(--hint); cursor: grab;
  padding: 10px 8px; user-select: none; flex-shrink: 0;
  min-height: 44px; display: flex; align-items: center;
}
.drag-handle:active { cursor: grabbing; }

.edit-btn, .del-btn {
  background: none; border: none; cursor: pointer;
  padding: 10px; border-radius: 10px; flex-shrink: 0;
  transition: background 0.1s; line-height: 1;
  min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
}
.edit-btn { color: var(--hint); font-size: 15px; }
.edit-btn:hover { background: rgba(123,140,222,0.1); color: var(--accent); }
.del-btn { color: var(--hint); font-size: 13px; }
.del-btn:hover { background: rgba(220,80,80,0.08); color: #e06060; }

.check-item {
  transition: transform 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.check-item.dragging {
  opacity: 0;
  pointer-events: none;
}
.check-item.shift-down  { transform: translateY(56px); }
.check-item.shift-up    { transform: translateY(-56px); }
.check-text[contenteditable="true"] {
  outline: none; border-bottom: 1.5px solid var(--accent); padding-bottom: 1px;
  white-space: normal; overflow: visible; text-overflow: clip;
}

.add-item-row { padding: 8px 0 4px; }

/* 출발 완료 배너 */
.depart-done-banner {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  padding: max(52px, env(safe-area-inset-top, 52px)) 24px 20px;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; z-index: 300; text-align: center;
  animation: slideDown 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes slideDown {
  from { transform: translateY(-100%); }
  to   { transform: translateY(0); }
}
.depart-done-title { font-size: 20px; font-weight: 600; color: #fff; }
.depart-done-desc { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.6; }
.depart-done-btn {
  margin-top: 8px; padding: 10px 28px;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 999px; color: #fff;
  font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}

/* 온보딩 툴팁 */
.drag-tooltip {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--text);
  color: #fff;
  padding: 18px 24px;
  padding-bottom: max(18px, env(safe-area-inset-bottom, 18px));
  display: flex; align-items: center; gap: 14px;
  z-index: 200;
  animation: slideUp 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.drag-tooltip-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 18px;
}
.drag-tooltip-text {
  flex: 1;
  font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.9);
}
.drag-tooltip-text strong {
  display: block; font-size: 14px; font-weight: 600;
  color: #fff; margin-bottom: 2px;
}
.drag-tooltip-close {
  background: rgba(255,255,255,0.15);
  border: none; border-radius: 8px;
  color: #fff; font-size: 12px; font-weight: 600;
  padding: 6px 12px; cursor: pointer; font-family: inherit;
  flex-shrink: 0;
}
.add-item-btn {
  font-size: 14px; color: var(--accent);
  background: rgba(123,140,222,0.08);
  border: 1.5px dashed rgba(123,140,222,0.6);
  border-radius: 12px; padding: 13px 16px; min-height: 48px;
  cursor: pointer; font-family: inherit; width: 100%;
  transition: background 0.15s; font-weight: 600;
}

.checklist-footer {
  padding: 12px 20px;
  padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));

<script>
const templates = {
  morning: [
    {text:'지갑 챙기기', badge:'필수'},
    {text:'열쇠 확인', badge:'필수'},
    {text:'가스 잠금', badge:'안전'},
    {text:'핸드폰 충전기', badge:''},
    {text:'노트북', badge:''},
    {text:'텀블러', badge:''},
    {text:'현관문 잠금', badge:'안전'},
  ],
  casual: [
    {text:'지갑', badge:'필수'},
    {text:'핸드폰', badge:'필수'},
    {text:'이어폰', badge:''},
    {text:'가스 확인', badge:'안전'},
    {text:'현관 잠금', badge:'안전'},
  ],
  school: [
    {text:'교재/노트', badge:'필수'},
    {text:'학생증', badge:'필수'},
    {text:'도시락/카드', badge:''},
    {text:'충전기', badge:''},
    {text:'현관 잠금', badge:'안전'},
  ],
  travel: [
    {text:'여권/신분증', badge:'필수'},
    {text:'항공권', badge:'필수'},
    {text:'지갑', badge:'필수'},
    {text:'충전기/어댑터', badge:''},
    {text:'세면도구', badge:''},
    {text:'가스 잠금', badge:'안전'},
    {text:'현관 이중 잠금', badge:'안전'},
  ]
};

let currentKey = 'morning';
let doneCount = 0;
let totalBubbles = 0;

function saveTemplates() {
  localStorage.setItem('readygo_templates', JSON.stringify(templates));
}
function loadSavedTemplates() {
  const saved = localStorage.getItem('readygo_templates');
  if (saved) {
    const parsed = JSON.parse(saved);
    Object.assign(templates, parsed);
  }
}

let dragSrc = null;

// ── auto-scroll 전용 interval ──
let _autoScrollInterval = null;

function stopAutoScroll() {
  if (_autoScrollInterval) {
    clearInterval(_autoScrollInterval);
    _autoScrollInterval = null;
  }
}

function startAutoScroll(direction) {
  stopAutoScroll();
  const body = document.getElementById('checklistBody');
  const SPEED = 8;
  _autoScrollInterval = setInterval(() => {
    body.scrollTop += direction * SPEED;
  }, 16);
}

const checkedSets = {};

function renderChecklist(key) {
  currentKey = key;
  const body = document.getElementById('checklistBody');
  body.innerHTML = '';

  if (!checkedSets[key]) checkedSets[key] = new Set();
  const checkedSet = checkedSets[key];

  (templates[key] || []).forEach((item, idx) => {
    const d = document.createElement('div');
    d.className = 'check-item';
    if (checkedSet.has(idx)) d.classList.add('checked');
    d.dataset.idx = idx;
    d.draggable = false;
    d.innerHTML = `
      <div class="drag-handle">⠿</div>
      <div class="check-circle">✓</div>
      <span class="check-text" contenteditable="false">${item.text}</span>
      ${item.badge ? `<span class="check-badge">${item.badge}</span>` : ''}
      <button class="edit-btn" title="수정">✎</button>
      <button class="del-btn" title="삭제">✕</button>
    `;

    d.querySelector('.check-circle').onclick = (e) => {
      e.stopPropagation();
      d.classList.toggle('checked');
      const i = parseInt(d.dataset.idx);
      if (d.classList.contains('checked')) checkedSet.add(i);
      else checkedSet.delete(i);
    };

    const editBtn = d.querySelector('.edit-btn');
    const textEl  = d.querySelector('.check-text');
    editBtn.onclick = (e) => {
      e.stopPropagation();
      const editing = textEl.contentEditable === 'true';
      if (editing) {
        textEl.contentEditable = 'false';
        textEl.blur();
        templates[key][idx].text = textEl.textContent.trim() || item.text;
        saveTemplates();
        editBtn.textContent = '✎';
        editBtn.style.color = '#bbb';
      } else {
        textEl.contentEditable = 'true';
        textEl.focus();
        const range = document.createRange();
        range.selectNodeContents(textEl);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        editBtn.textContent = '✔';
        editBtn.style.color = '#4a9';
      }
    };

    textEl.onkeydown = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); editBtn.click(); }
    };

    d.querySelector('.del-btn').onclick = (e) => {
      e.stopPropagation();
      templates[key].splice(idx, 1);
      saveTemplates();
      const newSet = new Set();
      checkedSet.forEach(ci => {
        if (ci === idx) return;
        newSet.add(ci > idx ? ci - 1 : ci);
      });
      checkedSets[key] = newSet;
      renderChecklist(key);
    };

    const handle = d.querySelector('.drag-handle');

    // ── 터치 드래그 (iOS 포함) ──
    let touchDragSrcIdx = null;
    let touchDragGhost  = null;
    let touchDragStartY = 0;
    let touchDragLastTarget = null;

    handle.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const t = e.touches[0];
      touchDragSrcIdx  = parseInt(d.dataset.idx);
      touchDragStartY  = t.clientY;
      dragSrc = d;
      d.classList.add('dragging');

      // 고스트 생성
      touchDragGhost = d.cloneNode(true);
      touchDragGhost.style.cssText = `
        position:fixed; pointer-events:none; z-index:999;
        width:${d.offsetWidth}px; opacity:0.85;
        left:${d.getBoundingClientRect().left}px;
        top:${d.getBoundingClientRect().top}px;
        box-shadow:0 8px 32px rgba(80,90,180,0.25);
        border-radius:14px; background:#fff;
        transition:none;
      `;
      document.body.appendChild(touchDragGhost);
    }, { passive: false });

    handle.addEventListener('touchmove', (e) => {
      if (!touchDragGhost) return;
      e.preventDefault();
      const t = e.touches[0];

      // 고스트 이동 — 초기 위치에서 dy만큼 이동
      const dy = t.clientY - touchDragStartY;
      const initTop = parseFloat(touchDragGhost.dataset.initTop || touchDragGhost.style.top) || 0;
      if (!touchDragGhost.dataset.initTop) touchDragGhost.dataset.initTop = touchDragGhost.style.top;
      touchDragGhost.style.top = (parseFloat(touchDragGhost.dataset.initTop) + dy) + 'px';

      // auto-scroll
      const bodyEl = document.getElementById('checklistBody');
      const rect = bodyEl.getBoundingClientRect();
      const ZONE = 80;
      if (t.clientY < rect.top + ZONE)        startAutoScroll(-1);
      else if (t.clientY > rect.bottom - ZONE) startAutoScroll(1);
      else                                      stopAutoScroll();

      // 현재 위치의 아이템 감지
      touchDragGhost.style.display = 'none';
      const elBelow = document.elementFromPoint(t.clientX, t.clientY);
      touchDragGhost.style.display = '';

      const targetItem = elBelow ? elBelow.closest('.check-item') : null;
      const bodyEl2 = document.getElementById('checklistBody');
      const items = Array.from(bodyEl2.querySelectorAll('.check-item'));

      items.forEach(el => el.classList.remove('shift-down', 'shift-up'));

      if (targetItem && targetItem !== d) {
        touchDragLastTarget = targetItem;
        const fromIdx = parseInt(d.dataset.idx);
        const toIdx   = parseInt(targetItem.dataset.idx);
        items.forEach(el => {
          const i = parseInt(el.dataset.idx);
          if (el === d) return;
          if (fromIdx < toIdx && i > fromIdx && i <= toIdx) el.classList.add('shift-up');
          else if (fromIdx > toIdx && i >= toIdx && i < fromIdx) el.classList.add('shift-down');
        });
      }
    }, { passive: false });

    handle.addEventListener('touchend', (e) => {
      stopAutoScroll();
      if (touchDragGhost) {
        document.body.removeChild(touchDragGhost);
        touchDragGhost = null;
      }
      d.classList.remove('dragging');
      const bodyEl = document.getElementById('checklistBody');
      bodyEl.querySelectorAll('.check-item').forEach(el => el.classList.remove('shift-down', 'shift-up'));

      if (touchDragLastTarget && touchDragLastTarget !== d) {
        const fromIdx = parseInt(d.dataset.idx);
        const toIdx   = parseInt(touchDragLastTarget.dataset.idx);
        const arr = templates[key];
        const [moved] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, moved);
        saveTemplates();

        const wasChecked = checkedSet.has(fromIdx);
        const newSet = new Set();
        checkedSet.forEach(ci => {
          if (ci === fromIdx) return;
          let ni = ci;
          if (fromIdx < toIdx) { if (ci > fromIdx && ci <= toIdx) ni = ci - 1; }
          else                  { if (ci >= toIdx && ci < fromIdx) ni = ci + 1; }
          newSet.add(ni);
        });
        if (wasChecked) newSet.add(toIdx);
        checkedSets[key] = newSet;
        renderChecklist(key);
      }
      touchDragLastTarget = null;
      dragSrc = null;
    });

    // ── 마우스 드래그 (데스크탑) ──
    handle.addEventListener('mousedown', () => { d.draggable = true; });
    d.addEventListener('dragend', () => { d.draggable = false; });

    d.addEventListener('dragstart', (e) => {
      dragSrc = d;
      setTimeout(() => d.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });

    d.addEventListener('dragend', () => {
      d.draggable = false;
      d.classList.remove('dragging');
      // ── auto-scroll 정지 ──
      stopAutoScroll();
      body.querySelectorAll('.check-item').forEach(el => {
        el.classList.remove('shift-down', 'shift-up');
      });
    });

    d.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';

      // ── auto-scroll: 목록 상하 끝 근처에서 자동 스크롤 ──
      const rect = body.getBoundingClientRect();
      const ZONE = 80; // 감지 영역 px
      const y = e.clientY;
      if (y < rect.top + ZONE) {
        startAutoScroll(-1); // 위로
      } else if (y > rect.bottom - ZONE) {
        startAutoScroll(1);  // 아래로
      } else {
        stopAutoScroll();    // 중간이면 정지
      }

      if (!dragSrc || d === dragSrc) return;

      const fromIdx = parseInt(dragSrc.dataset.idx);
      const toIdx   = parseInt(d.dataset.idx);
      const items   = Array.from(body.querySelectorAll('.check-item'));

      items.forEach(el => el.classList.remove('shift-down', 'shift-up'));

      items.forEach(el => {
        const i = parseInt(el.dataset.idx);
        if (el === dragSrc) return;
        if (fromIdx < toIdx && i > fromIdx && i <= toIdx) {
          el.classList.add('shift-up');
        } else if (fromIdx > toIdx && i >= toIdx && i < fromIdx) {
          el.classList.add('shift-down');
        }
      });
    });

    d.addEventListener('drop', (e) => {
      e.preventDefault();
      stopAutoScroll();
      if (dragSrc && dragSrc !== d) {
        const fromIdx = parseInt(dragSrc.dataset.idx);
        const toIdx   = parseInt(d.dataset.idx);

        const arr = templates[key];
        const [moved] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, moved);
        saveTemplates();

        const wasChecked = checkedSet.has(fromIdx);
        const newSet = new Set();
        checkedSet.forEach(ci => {
          if (ci === fromIdx) return;
          let ni = ci;
          if (fromIdx < toIdx) {
            if (ci > fromIdx && ci <= toIdx) ni = ci - 1;
          } else {
            if (ci >= toIdx && ci < fromIdx) ni = ci + 1;
          }
          newSet.add(ni);
        });
        if (wasChecked) newSet.add(toIdx);
        checkedSets[key] = newSet;

        renderChecklist(key);
      }
    });

    body.appendChild(d);
  });

  // ── checklist-body 자체에도 dragover/dragleave 등록 (빈 공간 처리) ──
  body.addEventListener('dragover', (e) => {
    const rect = body.getBoundingClientRect();
    const ZONE = 80;
    const y = e.clientY;
    if (y < rect.top + ZONE) {
      startAutoScroll(-1);
    } else if (y > rect.bottom - ZONE) {
      startAutoScroll(1);
    } else {
      stopAutoScroll();
    }
  });

  body.addEventListener('dragleave', (e) => {
    // 목록 영역 완전히 벗어나면 정지
    const rect = body.getBoundingClientRect();
    if (e.clientY < rect.top || e.clientY > rect.bottom) {
      stopAutoScroll();
    }
  });

  const addRow = document.createElement('div');
  addRow.className = 'add-item-row';
  addRow.innerHTML = `<button class="add-item-btn" onclick="addItem('${key}')">+ 항목 추가</button>`;
  body.appendChild(addRow);
}

function addItem(key) {
  templates[key].push({ text: '새 항목', badge: '' });
  saveTemplates();
  renderChecklist(key);
  setTimeout(() => {
    const items = document.querySelectorAll('.check-item');
    const last = items[items.length - 1];
    if (last) last.querySelector('.edit-btn').click();
  }, 50);
}

function loadTemplate(el, key) {
  document.querySelectorAll('.tab-pill').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  checkedSets[key] = new Set();
  renderChecklist(key);
}

let physBubbles = [];
let physRAF = null;

function startPhysLoop() {
  if (physRAF) cancelAnimationFrame(physRAF);
  if (!window._physLoop) return;
  physRAF = requestAnimationFrame(window._physLoop);
}

const GRADIENTS = [
  'radial-gradient(circle at 38% 32%, rgba(210,205,255,0.9) 0%, rgba(175,165,248,0.75) 55%, rgba(155,145,235,0.5) 100%)',
  'radial-gradient(circle at 38% 32%, rgba(195,220,255,0.9) 0%, rgba(155,185,248,0.75) 55%, rgba(130,165,235,0.5) 100%)',
  'radial-gradient(circle at 38% 32%, rgba(225,205,255,0.9) 0%, rgba(190,165,248,0.75) 55%, rgba(168,145,235,0.5) 100%)',
  'radial-gradient(circle at 38% 32%, rgba(195,235,255,0.9) 0%, rgba(155,200,248,0.75) 55%, rgba(130,178,235,0.5) 100%)',
];
const BORDERS = [
  'rgba(255,255,255,0.85)',
  'rgba(255,255,255,0.85)',
  'rgba(255,255,255,0.85)',
  'rgba(255,255,255,0.85)',
];

function buildBubbles(items) {
  doneCount = 0;
  totalBubbles = items.length;
  if (physRAF) { cancelAnimationFrame(physRAF); physRAF = null; }
  physBubbles = [];

  const stage = document.getElementById('bubbleStage');
  stage.innerHTML = '';
  stage.style.padding = '0';
  stage.style.gap = '0';

  const n = items.length;

  requestAnimationFrame(() => {
    const W = stage.clientWidth;
    const H = stage.clientHeight;
    const PAD = W * 0.03;

    const base = Math.min(W, H);
    const sizeMap = n <= 2
      ? [base * 0.44, base * 0.30, base * 0.22]
      : n <= 4
      ? [base * 0.38, base * 0.26, base * 0.20]
      : n <= 6
      ? [base * 0.32, base * 0.23, base * 0.17]
      : [base * 0.27, base * 0.20, base * 0.15];
    const sizes = items.map((_, i) => i === 0 ? sizeMap[0] : i <= 2 ? sizeMap[1] : sizeMap[2]);

    function placeWithoutOverlap(r) {
      let tries = 0;
      while (tries++ < 400) {
        const x = PAD + r + Math.random() * (W - 2*r - 2*PAD);
        const y = PAD + r + Math.random() * (H - 2*r - 2*PAD);
        let ok = true;
        for (const pb of physBubbles) {
          const dx = x - pb.x, dy = y - pb.y;
          if (Math.sqrt(dx*dx+dy*dy) < r + pb.r + 6) { ok = false; break; }
        }
        if (ok) return {x, y};
      }
      return {
        x: PAD + r + Math.random() * Math.max(0, W - 2*r - 2*PAD),
        y: PAD + r + Math.random() * Math.max(0, H - 2*r - 2*PAD),
      };
    }

    items.forEach((text, idx) => {
      const r = sizes[idx] / 2;
      const gi = idx % GRADIENTS.length;
      const pos = placeWithoutOverlap(r);
      const speed = 0.25 + Math.random() * 0.2;
      const angle = Math.random() * Math.PI * 2;

      const el = makeBubble(text, idx, '');
      el.style.width = sizes[idx] + 'px';
      el.style.height = sizes[idx] + 'px';
      el.style.background = GRADIENTS[gi];
      el.style.border = '1.5px solid ' + BORDERS[gi];
      el.style.boxShadow = '0 6px 24px rgba(100,110,190,0.18), 0 2px 8px rgba(100,110,190,0.08)';
      el.style.left = (pos.x - r) + 'px';
      el.style.top  = (pos.y - r) + 'px';
      el.style.transition = 'none';
      el.style.animationDelay = (idx * 0.1) + 's';
      const lbl = el.querySelector('.task-label');
      lbl.style.fontSize = Math.max(10, Math.round(sizes[idx] * 0.088)) + 'px';
      stage.appendChild(el);

      physBubbles.push({
        el, r, x: pos.x, y: pos.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
      });
    });

    window._physLoop = function loop() {
      const W2 = stage.clientWidth;
      const H2 = stage.clientHeight;
      const pb = physBubbles;

      for (const b of pb) {
        if (b.el.classList.contains('pressing') || b.el.classList.contains('frozen')) continue;
        b.x += b.vx;
        b.y += b.vy;
        if (b.x - b.r < PAD)       { b.x = PAD + b.r;      b.vx = Math.abs(b.vx); }
        if (b.x + b.r > W2 - PAD)  { b.x = W2 - PAD - b.r; b.vx = -Math.abs(b.vx); }
        if (b.y - b.r < PAD)       { b.y = PAD + b.r;      b.vy = Math.abs(b.vy); }
        if (b.y + b.r > H2 - PAD)  { b.y = H2 - PAD - b.r; b.vy = -Math.abs(b.vy); }
      }

      for (let i = 0; i < pb.length; i++) {
        for (let j = i+1; j < pb.length; j++) {
          const a = pb[i], b2 = pb[j];
          const dx = b2.x - a.x, dy = b2.y - a.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const minDist = a.r + b2.r + 4;
          if (dist < minDist && dist > 0.01) {
            const nx = dx / dist, ny = dy / dist;
            const overlap = (minDist - dist) / 2;
            a.x -= nx * overlap; a.y -= ny * overlap;
            b2.x += nx * overlap; b2.y += ny * overlap;
            const dvx = a.vx - b2.vx, dvy = a.vy - b2.vy;
            const dot = dvx*nx + dvy*ny;
            if (dot > 0) {
              a.vx -= dot * nx; a.vy -= dot * ny;
              b2.vx += dot * nx; b2.vy += dot * ny;
            }
          }
        }
      }

      for (const b of pb) {
        b.el.style.left = (b.x - b.r) + 'px';
        b.el.style.top  = (b.y - b.r) + 'px';
      }

      physRAF = requestAnimationFrame(window._physLoop);
    }

    startPhysLoop();
  });

  document.getElementById('homeSubtitle').textContent = '지금 해야 할 것';
  document.getElementById('completeOverlay').classList.remove('show');
  // 초기화 버튼 표시
  const resetBtn = document.getElementById('resetBubblesBtn');
  if (resetBtn) resetBtn.style.display = 'block';
}

function resetBubbles() {
  if (physRAF) { cancelAnimationFrame(physRAF); physRAF = null; }
  physBubbles = [];
  doneCount = 0; totalBubbles = 0;

  // empty state 복원

    <div class="empty-text"><strong>루틴</strong> 탭에서<br>오늘 항목을 고르고<br><strong>시작하기</strong>를 눌러보세요</div>

function makeBubble(text, idx, sizeClass) {
  const id = 'bubble_' + idx;
  const div = document.createElement('div');
  div.className = 'bubble ' + sizeClass;
  div.id = id;
  div.innerHTML = `
    <div class="done-ring"></div>
    <span class="task-label">${text}</span>
    <span class="done-check">✓</span>
  `;

  let pressTimer = null;
  let pressing   = false;
  let menuEl     = null;
  let _pressStartX = 0, _pressStartY = 0;

  // ── 액션 메뉴 생성 ──
  function showActionMenu() {
    if (menuEl) return;

    const viewHome = document.getElementById('view-home');
    const bRect    = div.getBoundingClientRect();
    const vRect    = viewHome.getBoundingClientRect();
    const cx       = bRect.left - vRect.left + bRect.width / 2;
    const cy       = bRect.top  - vRect.top  + bRect.height / 2;
    const r        = bRect.width / 2;

    // 버블 정지
    div.classList.add('frozen');

    menuEl = document.createElement('div');
    menuEl.className = 'bubble-action-menu';

    // 버블 위쪽 배치, 화면 상단 잘림 방지
    const menuY = Math.max(44, cy - r - 20);
    menuEl.style.left = cx + 'px';
    menuEl.style.top  = menuY + 'px';

    // 카메라 버튼
    const camBtn = document.createElement('div');
    camBtn.className = 'bubble-action-btn action-camera';
    camBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;

    // 체크 버튼
    const chkBtn = document.createElement('div');
    chkBtn.className = 'bubble-action-btn action-check';
    chkBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;

    menuEl.appendChild(camBtn);
    menuEl.appendChild(chkBtn);
    viewHome.appendChild(menuEl);

    // ── 버튼에 직접 이벤트 — iOS 제스처 컨텍스트 확보 ──
    camBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
    }, { passive: false });

    camBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dismissMenu();
      openCamera(id);
    }, { passive: false });

    camBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dismissMenu();
      openCamera(id);
    });

    chkBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
    }, { passive: false });

    chkBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dismissMenu();
      completeBubble(id, null);
    }, { passive: false });

    chkBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dismissMenu();
      completeBubble(id, null);
    });

    // 다른 곳 탭하면 메뉴 닫기
    function onOutsideTap(e) {
      if (menuEl && !menuEl.contains(e.target) && e.target !== div) {
        dismissMenu();
        document.removeEventListener('touchstart', onOutsideTap);
        document.removeEventListener('mousedown',  onOutsideTap);
      }
    }
    setTimeout(() => {
      document.addEventListener('touchstart', onOutsideTap, { passive: true });
      document.addEventListener('mousedown',  onOutsideTap);
    }, 100);
  }

  function dismissMenu() {
    if (!menuEl) return;
    if (menuEl.parentNode) menuEl.parentNode.removeChild(menuEl);
    menuEl = null;
    div.classList.remove('pressing', 'frozen');
  }

  // ── 꾹 누르기 ──
  const startPress = (clientX, clientY) => {
    if (div.classList.contains('completing') || div.classList.contains('vanish')) return;
    if (menuEl) return; // 이미 메뉴 떠 있으면 무시
    _pressStartX = clientX;
    _pressStartY = clientY;
    pressing = true;
    div.classList.add('pressing');
    pressTimer = setTimeout(() => {
      if (pressing) {
        div.classList.remove('pressing');
        showActionMenu();
        pressing = false;
      }
    }, 600);
  };

  const cancelPress = () => {
    if (!pressing) return;
    pressing = false;
    div.classList.remove('pressing');
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  };

  div.addEventListener('touchstart', (e) => {
    if (menuEl) return; // 메뉴 떠 있으면 버블 터치 무시
    e.preventDefault();
    const t = e.touches[0];
    startPress(t.clientX, t.clientY);
  }, { passive: false });

  div.addEventListener('touchmove', (e) => {
    if (!pressing) return;
    const t = e.touches[0];
    const dx = t.clientX - _pressStartX;
    const dy = t.clientY - _pressStartY;
    if (Math.sqrt(dx*dx + dy*dy) > 10) cancelPress();
  }, { passive: true });

  div.addEventListener('touchend', () => {
    cancelPress();
    // 메뉴가 떠 있으면 touchend로 닫지 않음 — 직접 탭으로만 닫힘
  });

  div.addEventListener('touchcancel', () => {
    cancelPress();
    if (!menuEl) return;
  });

  div.addEventListener('mousedown', (e) => {
    startPress(e.clientX, e.clientY);
  });

  div.addEventListener('mouseup', () => {
    cancelPress();
  });

  div.addEventListener('mouseleave', () => {
    cancelPress();
  });

  return div;
}

// ── 카메라 오버레이 (getUserMedia) ──
let _cameraStream = null;
let _cameraTargetId = null;
let _facingMode = 'environment'; // 기본 후면

function openCamera(id) {
  _cameraTargetId = id;
  const overlay = document.getElementById('cameraOverlay');
  const video   = document.getElementById('cameraVideo');
  const label   = document.getElementById('cameraLabel');

  // 라벨에 항목명 표시
  const el = document.getElementById(id);
  if (el) {
    const lbl = el.querySelector('.task-label');
    if (lbl) label.textContent = lbl.textContent.trim();
  }

  // 오버레이 먼저 띄우기 — iOS는 사용자 제스처 컨텍스트 안에서 DOM 변경이 있어야 함
  overlay.classList.add('show');

  // 약간의 딜레이 후 스트림 시작 (오버레이 렌더 후)
  setTimeout(() => startCameraStream(), 80);
}

function startCameraStream() {
  const video = document.getElementById('cameraVideo');

  // 기존 스트림 정지
  if (_cameraStream) {
    _cameraStream.getTracks().forEach(t => t.stop());
    _cameraStream = null;
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: _facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  }).then(stream => {
    _cameraStream = stream;
    video.srcObject = stream;
  }).catch(err => {
    console.error('카메라 오류:', err);
    closeCameraOverlay();
    // getUserMedia 실패 시 input fallback
    openCameraFallback(_cameraTargetId);
  });
}

function openCameraFallback(id) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.style.cssText = 'position:fixed;top:-200px;left:-200px;width:1px;height:1px;opacity:0;';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (document.body.contains(input)) document.body.removeChild(input);
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => completeBubble(id, ev.target.result);
    reader.readAsDataURL(file);
  };
  document.body.appendChild(input);
  input.click();
}

function closeCameraOverlay() {
  if (_cameraStream) {
    _cameraStream.getTracks().forEach(t => t.stop());
    _cameraStream = null;
  }
  document.getElementById('cameraVideo').srcObject = null;
  document.getElementById('cameraOverlay').classList.remove('show');
  _cameraTargetId = null;
}

function shootCamera() {
  const video = document.getElementById('cameraVideo');
  const targetId = _cameraTargetId;

  // video가 실제로 재생 중인지 확인
  if (!video.srcObject || video.readyState < 2) {
    console.warn('video not ready:', video.readyState);
    return;
  }

  // ImageCapture API 시도 (iOS 17.4+ 지원)
  try {
    const track = _cameraStream && _cameraStream.getVideoTracks()[0];
    if (track && typeof ImageCapture !== 'undefined') {
      const imageCapture = new ImageCapture(track);
      imageCapture.takePhoto().then(blob => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          closeCameraOverlay();
          if (targetId) completeBubble(targetId, ev.target.result);
        };
        reader.readAsDataURL(blob);
      }).catch(() => {
        // ImageCapture 실패 시 canvas fallback
        canvasShoot(video, targetId);
      });
      return;
    }
  } catch(e) {}

  // canvas fallback
  canvasShoot(video, targetId);
}

function canvasShoot(video, targetId) {
  const w = video.videoWidth  || video.clientWidth  || 640;
  const h = video.videoHeight || video.clientHeight || 480;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);

  // toDataURL이 빈 이미지인지 체크
  const photoData = canvas.toDataURL('image/jpeg', 0.85);
  closeCameraOverlay();
  if (targetId) completeBubble(targetId, photoData.length > 5000 ? photoData : null);
}

// 카메라 버튼 이벤트
document.getElementById('cameraShutterBtn').addEventListener('click', shootCamera);

function completeBubble(id, photoData) {
  const el = document.getElementById(id);
  if (!el || el.classList.contains('completing') || el.classList.contains('vanish')) return;

  const labelEl = el.querySelector('.task-label');
  if (labelEl) {
    const now = new Date();
    const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    saveArchiveItem({
      label: labelEl.textContent.trim(),
      time: timeStr,
      photo: photoData || null
    });
  }

  el.classList.add('completing');
  setTimeout(() => {
    el.classList.add('vanish');
    physBubbles = physBubbles.filter(b => b.el.id !== id);
    doneCount++;
    if (doneCount >= totalBubbles) {
      if (physRAF) { cancelAnimationFrame(physRAF); physRAF = null; }
      setTimeout(() => document.getElementById('completeOverlay').classList.add('show'), 500);
    }
    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 420);
  }, 420);
}

function closeOverlay() {
  document.getElementById('completeOverlay').classList.remove('show');
  if (physRAF) { cancelAnimationFrame(physRAF); physRAF = null; }
  switchView('archive');
}

function switchView(name) {
  if (name !== 'home' && physRAF) {
    cancelAnimationFrame(physRAF);
    physRAF = null;
  }
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'home' && physBubbles.length > 0 && !physRAF) {
    startPhysLoop();
  }
  if (name === 'archive') {
    renderArchive();
  }
  if (name === 'checklist') {
    setTimeout(showDragTooltip, 600);
  }
}

function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const t = h + ':' + m;
  document.getElementById('clock').textContent = t;
  document.getElementById('statusTime').textContent = t;
  if (departHour === null) {
    document.getElementById('countdown').textContent = '—';
    document.getElementById('departLabel').textContent = '시간 설정';
    const hcd = document.getElementById('homeCountdown');
    if (hcd) hcd.textContent = '—';
    const pf = document.getElementById('progressFill');
    if (pf) pf.style.width = '0%';
    const pe = document.getElementById('progressEnd');
    if (pe) pe.textContent = '—';
    return;
  }
  const depart = new Date();
  depart.setHours(departHour, departMin, 0, 0);

  if (depart < now) {
    if (!window._departDoneShown) {
      window._departDoneShown = true;
      const fillEl = document.getElementById('progressFill');
      if (fillEl) fillEl.style.width = '100%';
      showDepartDone();
    }
    return;
  }

  const diffSec = Math.max(0, Math.floor((depart - now) / 1000));
  const hours = Math.floor(diffSec / 3600);
  const mins  = Math.floor((diffSec % 3600) / 60);
  const secs  = diffSec % 60;

  const cdEl = document.getElementById('countdown');
  const homeCD = document.getElementById('homeCountdown');
  if (diffSec === 0) {
    cdEl.innerHTML = '출발!';
    if (homeCD) homeCD.innerHTML = '출발!';
  } else if (hours > 0) {
    cdEl.innerHTML = hours + '<span>시간</span> ' + String(mins).padStart(2,'0') + '<span>분</span> ' + String(secs).padStart(2,'0') + '<span>초</span>';
    if (homeCD) homeCD.innerHTML = hours + '<span style="font-size:11px;color:var(--sub);margin-left:1px;">h</span> ' + String(mins).padStart(2,'0') + '<span style="font-size:11px;color:var(--sub);margin-left:1px;">m</span>';
  } else if (mins > 0) {
    cdEl.innerHTML = mins + '<span>분</span> ' + String(secs).padStart(2,'0') + '<span>초</span>';
    if (homeCD) homeCD.innerHTML = mins + '<span style="font-size:11px;color:var(--sub);margin-left:1px;">분</span> ' + String(secs).padStart(2,'0') + '<span style="font-size:11px;color:var(--sub);margin-left:1px;">초</span>';
  } else {
    cdEl.innerHTML = secs + '<span>초</span>';
    if (homeCD) homeCD.innerHTML = secs + '<span style="font-size:11px;color:var(--sub);margin-left:1px;">초</span>';
  }

  const fillEl  = document.getElementById('progressFill');
  const cdNumEl = document.getElementById('countdown');
  const endEl   = document.getElementById('progressEnd');

  if (endEl) endEl.textContent = String(departHour).padStart(2,'0') + ':' + String(departMin).padStart(2,'0');

  if (!window._departSetAt) {
    if (fillEl) fillEl.style.width = '0%';
    return;
  }

  const setAt = window._departSetAt;
  const totalSec = Math.max(1, (depart.getTime() - setAt) / 1000);
  const elapsedSec = Math.max(0, (now.getTime() - setAt) / 1000);
  const pct = Math.min(100, Math.round((elapsedSec / totalSec) * 100));

  if (fillEl) fillEl.style.width = pct + '%';

  if (pct >= 100 && !window._departDoneShown) {
    window._departDoneShown = true;
    showDepartDone();
  }

  if (pct >= 90 && pct < 100) {
    if (fillEl)  fillEl.style.filter = 'brightness(1.2) saturate(1.3)';
    if (cdNumEl) cdNumEl.classList.add('urgent');
  } else {
    if (fillEl)  fillEl.style.filter = 'none';
    if (cdNumEl) cdNumEl.classList.remove('urgent');
  }

  document.getElementById('departLabel').textContent =
    String(departHour).padStart(2,'0') + ':' + String(departMin).padStart(2,'0');
}

let departHour = null;
let departMin  = null;

function loadDepartTime() {
  const saved = localStorage.getItem('readygo_depart');
  if (saved) {
    const [h, m] = saved.split(':').map(Number);
    departHour = h; departMin = m;
  }
  const setAt = localStorage.getItem('readygo_depart_setat');
  window._departSetAt = setAt ? parseInt(setAt) : null;
}

function saveDepartTime(h, m) {
  departHour = h; departMin = m;
  localStorage.setItem('readygo_depart', h + ':' + m);
  const setAt = Date.now();
  localStorage.setItem('readygo_depart_setat', String(setAt));
  window._departSetAt = setAt;
  updateTime();
}

function openDepartSetting() {
  let selH = departHour !== null ? departHour : new Date().getHours();
  let selM = departMin  !== null ? departMin  : 0;

  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';

  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <div style="padding:0 0 20px;"><div class="sheet-title">출발 시간 설정</div></div>
    <div style="display:flex;justify-content:center;align-items:center;gap:0;position:relative;height:216px;">
      <div style="position:absolute;left:50%;transform:translateX(-50%);width:220px;height:52px;
                  background:#f0eeff;border-radius:14px;pointer-events:none;"></div>
      <div style="position:absolute;top:0;left:0;right:0;height:80px;
                  background:linear-gradient(to bottom,#fff 0%,transparent 100%);pointer-events:none;z-index:2;"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:80px;
                  background:linear-gradient(to top,#fff 0%,transparent 100%);pointer-events:none;z-index:2;"></div>
      <div id="drumH" style="width:100px;height:216px;overflow:hidden;position:relative;cursor:pointer;"></div>
      <div style="font-size:28px;font-weight:300;color:#ccc;width:20px;text-align:center;z-index:1;">:</div>
      <div id="drumM" style="width:100px;height:216px;overflow:hidden;position:relative;cursor:pointer;"></div>
    </div>
    <div class="sheet-btn-row">
      <button id="dCancel" class="sheet-btn secondary">취소</button>
      <button id="dSave" class="sheet-btn primary">저장</button>
    </div>`;

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);

  const ITEM_H = 52;

  function buildDrum(containerId, count, initVal, fmtFn) {
    const container = document.getElementById(containerId);
    let current = initVal;
    let startY = 0, startVal = 0, isDragging = false, velocity = 0, lastY = 0, lastTime = 0;

    const inner = document.createElement('div');
    inner.style.cssText = 'position:absolute;left:0;right:0;will-change:transform;';

    const COPIES = 3;
    const total  = count * COPIES;
    const offset = count;

    for (let i = 0; i < total; i++) {
      const v = i % count;
      const div = document.createElement('div');
      div.style.cssText = `height:${ITEM_H}px;display:flex;align-items:center;justify-content:center;
        font-size:26px;font-weight:300;color:#2a2d4a;user-select:none;`;
      div.textContent = fmtFn(v);
      inner.appendChild(div);
    }
    container.appendChild(inner);

    function getTopForVal(val) {
      const centerY = 216 / 2 - ITEM_H / 2;
      return centerY - (offset + val) * ITEM_H;
    }

    let currentTop = getTopForVal(current);
    inner.style.transform = `translateY(${currentTop}px)`;
    updateOpacity();

    function updateOpacity() {
      const centerY = 216 / 2;
      Array.from(inner.children).forEach((ch, i) => {
        const itemCenter = currentTop + i * ITEM_H + ITEM_H / 2;
        const dist = Math.abs(itemCenter - centerY);
        if (dist < ITEM_H * 0.5) {
          ch.style.opacity = '1';
          ch.style.fontSize = '30px';
          ch.style.fontWeight = '400';
          ch.style.color = '#2a2d4a';
        } else if (dist < ITEM_H * 1.5) {
          ch.style.opacity = '0.4';
          ch.style.fontSize = '24px';
          ch.style.fontWeight = '300';
          ch.style.color = '#888';
        } else {
          ch.style.opacity = '0.15';
          ch.style.fontSize = '20px';
          ch.style.fontWeight = '300';
          ch.style.color = '#ccc';
        }
      });
    }

    function snapToNearest(animated) {
      const centerY = 216 / 2 - ITEM_H / 2;
      const rawIdx = (-currentTop + centerY) / ITEM_H;
      const snapIdx = Math.round(rawIdx);
      current = ((snapIdx % count) + count) % count;
      const snapTop = centerY - snapIdx * ITEM_H;

      if (animated) {
        inner.style.transition = 'transform 0.28s cubic-bezier(0.33,1,0.68,1)';
      } else {
        inner.style.transition = 'none';
      }
      currentTop = snapTop;
      inner.style.transform = `translateY(${snapTop}px)`;
      setTimeout(updateOpacity, 10);
    }

    function clampScroll() {
      const centerY = 216 / 2 - ITEM_H / 2;
      const minTop = centerY - (offset + count - 1) * ITEM_H - ITEM_H * 0.5;
      const maxTop = centerY - offset * ITEM_H + ITEM_H * 0.5;
      if (currentTop < minTop || currentTop > maxTop) {
        inner.style.transition = 'none';
        const normVal = ((current % count) + count) % count;
        currentTop = centerY - (offset + normVal) * ITEM_H;
        inner.style.transform = `translateY(${currentTop}px)`;
      }
    }

    container.addEventListener('touchstart', (e) => {
      inner.style.transition = 'none';
      startY = e.touches[0].clientY;
      lastY  = startY;
      lastTime = Date.now();
      velocity = 0;
      isDragging = true;
    }, {passive:true});

    container.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const y = e.touches[0].clientY;
      const now = Date.now();
      velocity = (y - lastY) / (now - lastTime + 1) * 16;
      lastY = y; lastTime = now;
      currentTop += y - startY;
      startY = y;
      inner.style.transform = `translateY(${currentTop}px)`;
      updateOpacity();
    }, {passive:true});

    container.addEventListener('touchend', () => {
      isDragging = false;
      let raf;
      function inertia() {
        if (Math.abs(velocity) < 0.5) { snapToNearest(true); return; }
        currentTop += velocity;
        velocity  *= 0.92;
        inner.style.transform = `translateY(${currentTop}px)`;
        updateOpacity();
        clampScroll();
        raf = requestAnimationFrame(inertia);
      }
      inertia();
    });

    container.addEventListener('mousedown', (e) => {
      inner.style.transition = 'none';
      startY = e.clientY; lastY = startY; lastTime = Date.now(); velocity = 0; isDragging = true;
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const now = Date.now();
      velocity = (e.clientY - lastY) / (now - lastTime + 1) * 16;
      lastY = e.clientY; lastTime = now;
      currentTop += e.clientY - startY;
      startY = e.clientY;
      inner.style.transform = `translateY(${currentTop}px)`;
      updateOpacity();
    });
    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      snapToNearest(true);
    });

    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      inner.style.transition = 'none';
      currentTop -= e.deltaY * 0.5;
      inner.style.transform = `translateY(${currentTop}px)`;
      updateOpacity();
      clearTimeout(container._wheelTimer);
      container._wheelTimer = setTimeout(() => snapToNearest(true), 80);
    }, {passive:false});

    return { getVal: () => current };
  }

  const dH = buildDrum('drumH', 24, selH, (v) => String(v).padStart(2,'0'));
  const dM = buildDrum('drumM', 60, selM, (v) => String(v).padStart(2,'0'));

  document.getElementById('dSave').onclick = () => {
    saveDepartTime(dH.getVal(), dM.getVal());
    document.body.removeChild(overlay);
  };
  document.getElementById('dCancel').onclick = () => document.body.removeChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) document.body.removeChild(overlay); });
}

const ARCHIVE_KEY = 'readygo_archive';
const ARCHIVE_DATE_KEY = 'readygo_archive_date';

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function loadArchive() {
  const savedDate = localStorage.getItem(ARCHIVE_DATE_KEY);
  if (savedDate !== todayStr()) {
    localStorage.removeItem(ARCHIVE_KEY);
    localStorage.setItem(ARCHIVE_DATE_KEY, todayStr());
  }
  return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
}

function saveArchiveItem(item) {
  const list = loadArchive();
  list.push(item);
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(list));
  localStorage.setItem(ARCHIVE_DATE_KEY, todayStr());
}

function confirmClearArchive() {
  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';
  overlay.innerHTML = `
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">아카이브 초기화</div>
      <div class="sheet-sub">오늘 기록된 모든 완료 항목이 삭제돼요. 계속할까요?</div>
      <div class="sheet-btn-row">
        <button id="clearNo" class="sheet-btn secondary">취소</button>
        <button id="clearYes" class="sheet-btn primary">삭제할게요</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('clearYes').onclick = () => {
    localStorage.removeItem('readygo_archive');
    localStorage.setItem('readygo_archive_date', todayStr());
    renderArchive();
    document.body.removeChild(overlay);
  };
  document.getElementById('clearNo').onclick = () => document.body.removeChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) document.body.removeChild(overlay); };
}

loadSavedTemplates();

updateTime();
setInterval(updateTime, 1000);

// 자정 초기화 — 60초마다 + 앱 포그라운드 복귀 시 체크 (iOS 백그라운드 타이머 보완)
function checkDateReset() {
  const saved = localStorage.getItem(ARCHIVE_DATE_KEY);
  if (saved && saved !== todayStr()) {
    localStorage.removeItem(ARCHIVE_KEY);
    localStorage.setItem(ARCHIVE_DATE_KEY, todayStr());
    renderArchive();
  }
}
setInterval(checkDateReset, 60000);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkDateReset();
});
